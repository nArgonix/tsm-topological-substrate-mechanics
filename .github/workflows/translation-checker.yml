name: Check Translation Status

on:
  push:
    branches: [ main ]

# OTO ROZWIĄZANIE: Wymuszenie bezpiecznej, nowej wersji Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  update-readme: # To tutaj Runner wyrzucił ostrzeżenie
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run translation check script
        run: python .github/scripts/check_translations.py

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: auto-update translation status in UPDATE.md"
          file_pattern: 'UPDATE_CHK.md'
